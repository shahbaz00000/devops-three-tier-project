name: shahbaz CI workflow

on:
  push:

jobs:
  build-and-push: #job ka name
    runs-on: ubuntu-latest  #Github action runner ka environment

    steps:
      - name: Checkout code #step ka name
        uses: actions/checkout@v4  #github action to checkout the code from the repository

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      -name: Login to DockerHub
       uses: docker/login-action@v2
       with:
         username: ${{ secrets.DOCKER_USERNAME }}
         password: ${{ secrets.DOCKER_PASSWORD }}

      -name: docker push
       uses: docker/build-push-action@v7
         with:
           context: .backend
           push: true
           tags: ${{ secrets.DOCKER_USERNAME }}/skillpulse-backend:latest
  